services:
  db:
    image: postgres:16-alpine
    container_name: bozova-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bozova
      POSTGRES_USER: bozova
      POSTGRES_PASSWORD: bozova
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
